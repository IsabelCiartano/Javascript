<!DOCTYPE html>
<html lang="en">

<body>
    <script>
        //dati due numeri restituire la loro media 
//tradizionale---------------------------------------------------------------------
        function mediaT(a,b){
            let m=0;
            m=(a+b)/2;
            console.log("la media è " +m);
        }
// const----------------------------------------------------------------------------
        const mediaC=function(a,b){
            let m=0;
            m=(a+b)/2;
            console.log("la media è " +m);
        }
//freccia----------------------------------------------------------------------------
        const mediaF=(a,b)=>{
            let m=0;
            m=(a+b)/2;
            console.log("la media è " +m);
        }
//-----------------------------------------------------------------------------
        mediaT(3,3)
        mediaC(5,5)
        mediaF(1,1)

//VALORI DI DEFAULT=================================================================
function media(a=2,b=3){
    return (a+b)/2;
}

console.log(media(5))//sottointeso il 3 pk abbiamo messo b=3
console.log(media(undefined,6))//sottointeso 2 pk a=2
console.log(media())//entrambi sottointesi a=2 b=3

    </script>
</body>
