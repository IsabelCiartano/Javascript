<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
    /*Crea una Promise che si risolve dopo 3 secondi e ritorna la stringa "Done!". 
    Stampa il risultato con il metodo then.    */

    function done(){
        return new Promise((resolve,reject)=>{
            setTimeout(()=>{
                resolve("done !!!!")
            },3000);
        
    })};

    done()
        .then((ris)=>{console.log(ris)})
        .catch((err)=>{console.log(err)})
        .finally(()=>{console.log("operazione terminata")})
    </script>
    
</body>
</html>
