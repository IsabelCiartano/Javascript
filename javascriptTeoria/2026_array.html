<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array in Javascript</title>
</head>

<body>
    <script>
        // Creazione di un array
        const studenti = ["Luca", "Anna", "Marco"];
        console.log(studenti);

        //inversione dell'array
        studenti.reverse();
        console.log(studenti); // ["Marco","Anna", "Luca"]

        // ordinamento alfabetico
        const a = ["banana", 1, false, null]
        a.sort();
        console.log(a); // ["Anna", "Luca", "Marco"]
        studenti.sort();
        console.log(studenti); // ["Anna", "Luca", "Marco"]

        // Inserire un elemento alla FINE → push()
        studenti.push("Giulia");
        console.log(studenti);      // ["Anna", "Luca", "Marco", "Giulia"]

        // Eliminare l'ultimo elemento → pop()
        let ultimo = studenti.pop();
        console.log(ultimo);   // Giulia
        console.log(studenti); // ["Anna", "Luca", "Marco"]

        // Inserire un elemento all'INIZIO → unshift()
        studenti.unshift("Paolo");
        console.log(studenti);  // ["Paolo", "Anna", "Luca", "Marco"]

        // Eliminare il primo elemento → shift()
        let primo = studenti.shift();
        console.log(primo);    // Paolo
        console.log(studenti); // ["Anna", "Luca", "Marco"]

        //Inserire / eliminare in una posizione specifica → splice()
        studenti.splice(1, 0, "Sara");
        console.log(studenti);      // ["Anna", "Sara", "Luca", "Marco"]

        // Significato:
        // splice(start[, quanti, elem1, ..., elemN])
        // Modifica l’array partendo dall’indice start; 
        // rimuove quanti elementi ed inserisce elem1, ..., elemN.
    
        // Eliminare un elemento
        studenti.splice(2, 1);
        console.log(studenti);  // ["Anna", "Sara", "Marco"]

        // Sostituire un elemento
        studenti.splice(1, 1, "Giovanni");
        console.log(studenti);      // ["Anna", "Giovanni", "Marco"]

        // Eliminare senza modificare l'array → slice()
        let parte = studenti.slice(1, 3);
        console.log("PARTE " + parte);    // ["Giovanni", "Marco"]
        console.log(studenti); // array invariato

        // Esempio COSA SUCCEDE?
        const numbers = [10, 20, 30];

        numbers.push(40);
        numbers.shift();
        numbers.splice(1, 0, 25);

        console.log("numbers " + numbers);

        // ciclo for per scorrere un array
        console.log("Ciclo for classico");
        for (let i = 0; i < studenti.length; i++) {
            console.log("Studente " + i + ": " + studenti[i]);
        }
        // ciclo for...of per scorrere un array
        console.log("Ciclo for...of");
        for (let studente of studenti) {
            console.log("Studente: " + studente);
        }
        // ciclo for in per scorrere un array
        console.log("Ciclo for...in");
        for (let index in studenti) {
            console.log("Studente " + index + ": " + studenti[index]);
        }

        // length è un attributo che indica la lunghezza dell'array
        // si può modificare 
        console.log("Lunghezza originale: " + studenti.length);
        studenti.length = 4;

        console.log("Lunghezza modificata: " + studenti.length);
        console.log(studenti); // ["Anna", "Giovanni"]

        // ciclo for per scorrere un array
        console.log("Ciclo for classico");
        for (let i = 0; i < studenti.length; i++) {
            console.log("Studente " + i + ": " + studenti[i]);
        }
        
        // ciclo for...of per scorrere un array
        console.log("Ciclo for...of");
        for (let studente of studenti) {
            console.log("Studente: " + studente);
        }
        // ciclo for in salta gli elementi "vuoti"
        console.log("Ciclo for...in");
        for (let index in studenti) {
            console.log("Studente " + index + ": " + studenti[index]);
        }

        //aggiungo un elemento in una posizione oltre la lunghezza attuale
        studenti[6] = "Elena";
        studenti[0] = null
        console.log(studenti); // ["Anna", "Giovanni", <3 empty items>, "Elena"]
        console.log("Lunghezza aggiornata: " + studenti.length); // 7

        // ciclo for in salta gli elementi "vuoti"
        console.log("Ciclo for...in");
        for (let index in studenti) {
            console.log("Studente " + index + ": " + studenti[index]);
        }
        console.log("tipo [0]: " + typeof (studenti[0])); // object (null è di tipo object)
        console.log("tipo [1]: " + typeof (studenti[1])); // string  
        console.log("tipo [3]: " + typeof (studenti[3])); // undefined (elemento vuoto)


// ============================================================
//  ITERARE GLI ARRAY IN JAVASCRIPT — esempi completi
// ============================================================


// ── Array di esempio usato in tutti gli esercizi ────────────
const numeri  = [12, 34, 45, 7, 19];
const giorni  = ["Lunedì", "Martedì", "Mercoledì", "Giovedì", "Venerdì"];


// ============================================================
//  1. FOR ... IN  — itera sugli INDICI
// ============================================================
console.log("=== FOR...IN ===");

let totale = 0;
for (let indice in numeri) {
    // "indice" è una stringa: "0", "1", "2", ...
    console.log("indice:", indice, "| tipo:", typeof indice, "| valore:", numeri[indice]);
    totale += numeri[indice];
}
console.log("Totale:", totale);  // 117

// ATTENZIONE: for...in salta gli indici non definiti
const sparso = [];
sparso[0] = 10;
sparso[2] = 20;   // l'indice 1 non esiste
console.log("\nArray sparso — for...in vede solo gli indici presenti:");
for (let i in sparso) {
    console.log("  indice:", i);   // stampa 0 e 2, NON 1
}


// ============================================================
//  2. FOR ... OF  — itera sui VALORI  (ES6)
// ============================================================
console.log("\n=== FOR...OF ===");

let somma = 0;
for (let valore of numeri) {
    // "valore" contiene direttamente il contenuto dell'elemento
    console.log("valore:", valore);
    somma += valore;
}
console.log("Somma:", somma);  // 117

// Funziona anche sulle stringhe (ogni carattere è un valore)
console.log("\nfor...of su una stringa:");
for (let carattere of "Ciao") {
    console.log(carattere);    // C, i, a, o
}

// ATTENZIONE: for...of vede tutti gli elementi, anche quelli non definiti che sono undefined
console.log("\nArray sparso — for...of vede tutti gli elementi:");
for (let i of sparso) {
    console.log("  val:", i);   // stampa 0 e 2, NON 1
}

// ============================================================
//  3. forEach  — esegue una funzione per ogni elemento
// ============================================================
console.log("\n=== forEach ===");

// Parametri callback: item (obbligatorio), index, array
giorni.forEach(function(item, index, array) {
    console.log("il " + (index + 1) + "° giorno è " + item);
});

// Versione con arrow function (scrittura più corta)
console.log("\nforEach con arrow function:");
giorni.forEach((item, index) => {
    console.log(`  [${index}] ${item}`);
});


// ============================================================
//  4. map  — restituisce un NUOVO array trasformato
// ============================================================
console.log("\n=== map ===");

// Esempio 1: costruisce frasi dai giorni
const frasi = giorni.map(function(item, index) {
    return "il " + (index + 1) + "° giorno è " + item;
});
console.log("Array di frasi:", frasi);

// Esempio 2: raddoppia ogni numero
const doppi = numeri.map(n => n * 2);
console.log("Numeri raddoppiati:", doppi);  // [24, 68, 90, 14, 38]

// NOTA: map non modifica l'array originale
console.log("Array originale invariato:", numeri);


// ============================================================
//  5. filter  — restituisce un NUOVO array filtrato
// ============================================================
console.log("\n=== filter ===");

// Esempio 1: giorni che iniziano con "M"
const conM = giorni.filter(function(item) {
    return item.startsWith("M");
});
console.log("Giorni con M:", conM);  // ['Martedì', 'Mercoledì']

// Esempio 2: numeri maggiori di 15
const grandi = numeri.filter(n => n > 15);
console.log("Numeri > 15:", grandi);  // [34, 45, 19]

// Se nessun elemento passa il filtro → array vuoto
const nessuno = numeri.filter(n => n > 100);
console.log("Nessun risultato:", nessuno);  // []


// ============================================================
//  6. find  — restituisce il PRIMO elemento trovato
// ============================================================
console.log("\n=== find ===");

// Restituisce il valore, non l'indice
const primoConM = giorni.find(function(item) {
    return item.startsWith("M");
});
console.log("Primo giorno con M:", primoConM);  // 'Martedì'

// Se non trovato → undefined
const nonEsiste = numeri.find(n => n > 100);
console.log("Elemento non trovato:", nonEsiste);  // undefined


// ============================================================
//  7. findIndex  — restituisce l'INDICE del primo trovato
// ============================================================
console.log("\n=== findIndex ===");

const posConM = giorni.findIndex(function(item) {
    return item.startsWith("M");
});
console.log("Indice del primo giorno con M:", posConM);  // 1

// Se non trovato → -1
const posNonEsiste = numeri.findIndex(n => n > 100);
console.log("Indice non trovato:", posNonEsiste);  // -1


// ============================================================
//  8. ARRAY MULTIDIMENSIONALI (matrici)
// ============================================================
console.log("\n=== ARRAY MULTIDIMENSIONALI ===");

// Definizione con valori letterali
const mat = [
    [4, 3, 1],
    [8, 2, 7],
    [8, 6, 1]
];

// Accesso a un singolo elemento: mat[riga][colonna]
const otto = mat[1][0];
console.log("mat[1][0] =", otto);  // 8

// Stampa della matrice con cicli annidati
console.log("\nMatrice completa:");
for (let riga of mat) {
    console.log(riga.join("\t"));
}

// Creazione dinamica di una matrice N×M inizializzata a zero
const N = 3, M = 4;
const griglia = new Array(N);
for (let k = 0; k < N; k++) {
    griglia[k] = new Array(M).fill(0);
}
griglia[1][2] = 99;   // imposta un valore
console.log("\nGriglia 3x4 con un valore modificato:");
for (let riga of griglia) {
    console.log(riga.join("\t"));
}
//se ciclo con of prendo le righe di una matrice 
//per prendere il valore della riga devo fare un doppio ciclo
    </script>

</body>

</html>
